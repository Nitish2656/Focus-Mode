<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#7c3aed"/>
  <meta name="description" content="Track your 4-month Data Science learning journey — daily progress, streak, reminders & discipline."/>
  <link rel="manifest" href="./manifest.json"/>
  <!-- iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Focus"/>
  <link rel="apple-touch-icon" href="./icons/icon-192.png"/>
  <title>Focus — DS Learning Tracker</title>
  <link rel="stylesheet" href="./style.css"/>

  <!-- ── Firebase SDK (compat version — works without build tools) ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     LOGIN SCREEN — shown when not authenticated
  ══════════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-bg">
    <div class="login-glow login-glow-1"></div>
    <div class="login-glow login-glow-2"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <img src="./icons/icon-192.png" alt="Focus" class="login-icon"/>
    </div>
    <h1 class="login-title">Focus</h1>
    <p class="login-subtitle">Your 112-day Data Science journey starts here</p>

    <div class="login-features">
      <div class="lf-item"><span class="lf-icon">☁️</span> Progress saved to cloud</div>
      <div class="lf-item"><span class="lf-icon">📱</span> Works on any device</div>
      <div class="lf-item"><span class="lf-icon">🔥</span> Streak & habit tracking</div>
    </div>

    <button class="google-signin-btn" id="google-signin-btn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <p id="auth-error" class="auth-error hidden"></p>
    <p class="login-terms">By signing in you agree to use this app for your own learning journey 🚀</p>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     MAIN APP — hidden until authenticated
  ══════════════════════════════════════════════════════════ -->
<div id="app" class="hidden">

  <!-- ── User header bar ── -->
  <div class="user-bar" id="user-bar">
    <div class="user-info" id="user-info"></div>
    <button class="user-signout" onclick="signOutUser()">Sign out</button>
  </div>

  <!-- ── Pages ── -->
  <div class="page page-content" data-page="dashboard" id="page-dashboard"></div>
  <div class="page page-content hidden" data-page="curriculum" id="page-curriculum"></div>
  <div class="page page-content hidden" data-page="daily" id="page-daily"></div>
  <div class="page page-content hidden" data-page="discipline" id="page-discipline"></div>
  <div class="page page-content hidden" data-page="reminders" id="page-reminders"></div>

  <!-- ── Quiz Modal ── -->
  <div id="quiz-modal" class="hidden"></div>

  <!-- ── Bottom Nav ── -->
  <nav class="nav-bar">
    <button class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
      <span class="nav-icon">🏠</span><span>Home</span>
    </button>
    <button class="nav-item" data-page="curriculum" onclick="navigate('curriculum')">
      <span class="nav-icon">📚</span><span>Learn</span>
    </button>
    <button class="nav-item" data-page="daily" onclick="navigate('daily')">
      <span class="nav-icon">📓</span><span>Log</span>
    </button>
    <button class="nav-item" data-page="discipline" onclick="navigate('discipline')">
      <span class="nav-icon">⚡</span><span>Focus</span>
    </button>
    <button class="nav-item" data-page="reminders" onclick="navigate('reminders')">
      <span class="nav-icon">🔔</span><span>Remind</span>
    </button>
  </nav>

  <div id="toast"></div>
</div>

<!-- ── Scripts (order matters) ── -->
<script src="./data.js"></script>
<script src="./firebase-config.js"></script>
<script src="./auth.js"></script>
<script src="./app.js"></script>
</body>
</html>
